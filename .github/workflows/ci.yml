name: Moodle Plugin CI

on: [push, pull_request]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.1

      - name: Install moodle-plugin-ci
        run: composer create-project moodlehq/moodle-plugin-ci ci ^4

      - name: Run CI
        run: |
          cd ci
          php bin/moodle-plugin-ci install \
            --plugin ../ \
            --moodle 4.5

          php bin/moodle-plugin-ci phplint
          php bin/moodle-plugin-ci codechecker
          php bin/moodle-plugin-ci phpmd

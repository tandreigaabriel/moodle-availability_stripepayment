name: Moodle Plugin CI
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: "postgres"
          POSTGRES_HOST_AUTH_METHOD: "trust"
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 3

      mariadb:
        image: mariadb:10
        env:
          MYSQL_USER: "root"
          MYSQL_ALLOW_EMPTY_PASSWORD: "true"
          MYSQL_CHARACTER_SET_SERVER: "utf8mb4"
          MYSQL_COLLATION_SERVER: "utf8mb4_unicode_ci"
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval 10s --health-timeout 5s --health-retries 3

    strategy:
      fail-fast: false
      matrix:
        php: ["8.3"]
        moodle-branch: ["MOODLE_405_STABLE"]
        database: [mariadb]

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          ini-values: max_input_vars=5000
          coverage: none

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4
          echo "$(pwd)/ci/bin" >> $GITHUB_PATH
          echo "$(pwd)/ci/vendor/bin" >> $GITHUB_PATH
          sudo locale-gen en_AU.UTF-8

      - name: Install Moodle + Plugin
        run: |
          moodle-plugin-ci install \
            --plugin ./plugin \
            --db-host=127.0.0.1 \
            --branch ${{ github.ref_name }}
        env:
          DB: ${{ matrix.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: PHP Lint
        run: moodle-plugin-ci phplint ./plugin

      - name: PHP Mess Detector
        continue-on-error: true
        run: moodle-plugin-ci phpmd ./plugin

      - name: Moodle Code Checker
        run: moodle-plugin-ci phpcs ./plugin --max-warnings 0

      - name: Moodle PHPDoc Checker
        run: moodle-plugin-ci phpdoc ./plugin --max-warnings 0

      - name: Validate Plugin
        run: moodle-plugin-ci validate ./plugin

      - name: Check upgrade savepoints
        run: moodle-plugin-ci savepoints ./plugin

      - name: Mustache Lint
        run: moodle-plugin-ci mustache ./plugin

      - name: Grunt (optional)
        run: moodle-plugin-ci grunt ./plugin --max-lint-warnings 0

      - name: PHPUnit (optional)
        run: moodle-plugin-ci phpunit ./plugin --fail-on-warning

      - name: Behat (optional)
        continue-on-error: true
        run: moodle-plugin-ci behat ./plugin --profile chrome --scss-deprecations

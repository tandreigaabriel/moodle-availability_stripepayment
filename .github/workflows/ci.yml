name: Moodle Plugin CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: moodle
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    strategy:
      matrix:
        php-version: ["8.1"]
        moodle-branch: ["MOODLE_405_STABLE"]

    steps:
      - name: Check out plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pgsql, zip, gd, curl, xmlrpc, soap, intl, xml
          tools: composer
          coverage: none

      - name: Install Moodle plugin CI
        run: |
          composer create-project moodlehq/moodle-plugin-ci ci --no-dev --prefer-dist

      - name: Debug (check CI installed)
        run: |
          ls -la
          ls -la ci
          ls -la ci/bin

      - name: Install Moodle
        run: |
          ci/bin/moodle-plugin-ci install \
            --plugin ./plugin \
            --db-host 127.0.0.1 \
            --db-type pgsql \
            --db-user postgres \
            --db-pass postgres \
            --db-name moodle \
            --moodle-branch ${{ matrix.moodle-branch }}

      - name: Run checks
        if: always()
        run: |
          ci/bin/moodle-plugin-ci phplint
          ci/bin/moodle-plugin-ci phpcpd
          ci/bin/moodle-plugin-ci phpmd
          ci/bin/moodle-plugin-ci codechecker
          ci/bin/moodle-plugin-ci phpdoc
          ci/bin/moodle-plugin-ci validate
          ci/bin/moodle-plugin-ci savepoints
          ci/bin/moodle-plugin-ci mustache
          ci/bin/moodle-plugin-ci grunt

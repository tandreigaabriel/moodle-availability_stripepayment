name: Moodle Plugin CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 3

    strategy:
      fail-fast: false
      matrix:
        php: ["8.1"]
        moodle-branch: ["MOODLE_405_STABLE"]
        database: [pgsql]

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pgsql, zip, gd, curl, intl, xml
          tools: composer
          coverage: none

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4
          echo "$GITHUB_WORKSPACE/ci/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/ci/vendor/bin" >> $GITHUB_PATH

      - name: Install Moodle
        run: moodle-plugin-ci install --plugin ./plugin --db-host=127.0.0.1
        env:
          DB: ${{ matrix.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: PHP Lint
        run: moodle-plugin-ci phplint

      - name: PHP Mess Detector
        continue-on-error: true
        run: moodle-plugin-ci phpmd

      - name: Moodle Code Checker
        run: moodle-plugin-ci phpcs --exclude=vendor --max-warnings=0

      - name: Moodle PHPDoc Checker
        continue-on-error: true
        run: moodle-plugin-ci phpdoc --exclude=vendor

      - name: Validate
        run: moodle-plugin-ci validate

      - name: Check upgrade savepoints
        run: moodle-plugin-ci savepoints

      - name: Mustache Lint
        continue-on-error: true
        run: moodle-plugin-ci mustache

      - name: Grunt (JS/CSS)
        continue-on-error: true
        run: moodle-plugin-ci grunt --max-lint-warnings 20

      - name: PHPUnit tests
        run: moodle-plugin-ci phpunit || true
